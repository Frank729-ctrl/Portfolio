<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Portfolio</title>
<link rel="icon" href="/FDN_Logo.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/assets/css/main.css" />
<style>
  html,body{margin:0;background:#0a0a0a;color:#ededed;}
  body{animation:none!important;transition:opacity 180ms ease;}
  body.fade{opacity:0!important;}
  body.fade *{animation-play-state:paused!important;}
  body.fade .reveal{transition:none!important;}
</style>
</head>
<body class="fade">
<script src="/assets/js/main.js"></script>
<script>
(async () => {
  const routes = {
    '/':          '/pages/dashboard.html',
    '/dashboard': '/pages/dashboard.html',
    '/about':     '/pages/about.html',
    '/projects':  '/pages/projects.html',
    '/skills':    '/pages/skills.html',
    '/services':  '/pages/services.html',
    '/contact':   '/pages/contact.html',
  };

  function fadeIn() {
    // Mark all reveal elements visible immediately — the body fade-in is the page transition
    document.querySelectorAll('.reveal').forEach(el => el.classList.add('is-visible'));
    // Re-enable transition then remove fade so it animates in
    document.body.style.transition = '';
    requestAnimationFrame(() => document.body.classList.remove('fade'));
  }

  async function swapPage(html) {
    const doc = new DOMParser().parseFromString(html, 'text/html');

    document.title = doc.title;

    document.querySelectorAll('style[data-page]').forEach(s => s.remove());
    doc.querySelectorAll('head style').forEach(style => {
      const s = document.createElement('style');
      s.setAttribute('data-page', '');
      s.textContent = style.textContent;
      document.head.appendChild(s);
    });

    const scripts = [...doc.body.querySelectorAll('script')];
    scripts.forEach(s => s.remove());
    document.body.innerHTML = doc.body.innerHTML;

    // Re-run shared setup (nav, observers, copy handlers) synchronously
    if (window.__reinitMain) window.__reinitMain();

    for (const old of scripts) {
      if (old.src) continue; // external scripts handled by __reinitMain
      const s = document.createElement('script');
      s.textContent = `;(function(){${old.textContent}\n})();`;
      document.body.appendChild(s);
    }
  }

  function interceptLinks() {
    document.querySelectorAll('a[href]').forEach(a => {
      if (a.dataset.spa) return;
      const path = (a.getAttribute('href') || '').replace(/\/$/, '') || '/';
      if (!(path in routes)) return;
      a.dataset.spa = '1';
      a.addEventListener('click', async e => {
        e.preventDefault();
        const current = location.pathname.replace(/\/$/, '') || '/';
        if (path === current) return;
        try {
          // Fetch first — no forced delay
          const html = await fetch(routes[path]).then(r => {
            if (!r.ok) throw r.status;
            return r.text();
          });
          // Instant invisible swap (skip the CSS transition for the hide)
          document.body.style.transition = 'none';
          document.body.classList.add('fade');
          void document.body.offsetHeight; // force paint before swap
          window.scrollTo(0, 0);
          history.pushState({}, '', path);
          await swapPage(html);
          interceptLinks();
          fadeIn();
        } catch {
          location.assign(path);
        }
      });
    });
  }

  async function navigate(path, push) {
    try {
      const html = await fetch(routes[path] || routes['/']).then(r => {
        if (!r.ok) throw r.status;
        return r.text();
      });
      document.body.style.transition = 'none';
      document.body.classList.add('fade');
      void document.body.offsetHeight;
      window.scrollTo(0, 0);
      if (push) history.pushState({}, '', path);
      await swapPage(html);
      interceptLinks();
      fadeIn();
    } catch {
      location.reload();
    }
  }

  // Initial load
  const initPath = location.pathname.replace(/\/$/, '') || '/';
  try {
    const html = await fetch(routes[initPath] || routes['/']).then(r => {
      if (!r.ok) throw r.status;
      return r.text();
    });
    await swapPage(html);
    interceptLinks();
    fadeIn();
  } catch {
    location.replace(routes[initPath] || routes['/']);
  }

  // Browser back / forward
  window.addEventListener('popstate', () => {
    const path = location.pathname.replace(/\/$/, '') || '/';
    navigate(path, false);
  });
})();
</script>
</body>
</html>
