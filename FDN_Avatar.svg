<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B1F35"/>
      <stop offset="100%" style="stop-color:#112840"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5E3C"/>
      <stop offset="100%" style="stop-color:#6B4226"/>
    </linearGradient>
    <linearGradient id="shirtGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A3C5E"/>
      <stop offset="100%" style="stop-color:#0F2236"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="200" cy="200" r="196"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="url(#bgGrad)"/>
  <circle cx="200" cy="200" r="196" fill="none" stroke="#00C896" stroke-width="3" opacity="0.5"/>

  <!-- Subtle grid pattern background -->
  <g opacity="0.05" clip-path="url(#circle)">
    <line x1="0" y1="50" x2="400" y2="50" stroke="#00C896" stroke-width="1"/>
    <line x1="0" y1="100" x2="400" y2="100" stroke="#00C896" stroke-width="1"/>
    <line x1="0" y1="150" x2="400" y2="150" stroke="#00C896" stroke-width="1"/>
    <line x1="0" y1="200" x2="400" y2="200" stroke="#00C896" stroke-width="1"/>
    <line x1="0" y1="250" x2="400" y2="250" stroke="#00C896" stroke-width="1"/>
    <line x1="0" y1="300" x2="400" y2="300" stroke="#00C896" stroke-width="1"/>
    <line x1="0" y1="350" x2="400" y2="350" stroke="#00C896" stroke-width="1"/>
    <line x1="50" y1="0" x2="50" y2="400" stroke="#00C896" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="400" stroke="#00C896" stroke-width="1"/>
    <line x1="150" y1="0" x2="150" y2="400" stroke="#00C896" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="#00C896" stroke-width="1"/>
    <line x1="250" y1="0" x2="250" y2="400" stroke="#00C896" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="400" stroke="#00C896" stroke-width="1"/>
    <line x1="350" y1="0" x2="350" y2="400" stroke="#00C896" stroke-width="1"/>
  </g>

  <!-- Body / shirt -->
  <ellipse cx="200" cy="370" rx="110" ry="70" fill="url(#shirtGrad)"/>
  <!-- Collar -->
  <path d="M175 295 L200 320 L225 295" fill="none" stroke="#2A5C8E" stroke-width="2"/>

  <!-- Neck -->
  <rect x="185" y="265" width="30" height="40" rx="8" fill="url(#skinGrad)"/>

  <!-- Head -->
  <ellipse cx="200" cy="225" rx="72" ry="78" fill="url(#skinGrad)"/>

  <!-- Hair — short natural -->
  <path d="M128 215 Q128 140 200 138 Q272 140 272 215 Q265 175 200 172 Q135 175 128 215Z" fill="#1A0A00"/>
  <path d="M130 210 Q125 185 135 165 Q145 148 165 140" fill="none" stroke="#1A0A00" stroke-width="14" stroke-linecap="round"/>
  <path d="M270 210 Q275 185 265 165 Q255 148 235 140" fill="none" stroke="#1A0A00" stroke-width="14" stroke-linecap="round"/>

  <!-- Ears -->
  <ellipse cx="129" cy="228" rx="12" ry="16" fill="url(#skinGrad)"/>
  <ellipse cx="271" cy="228" rx="12" ry="16" fill="url(#skinGrad)"/>

  <!-- Eyes -->
  <ellipse cx="176" cy="218" rx="12" ry="10" fill="#1A0A00"/>
  <ellipse cx="224" cy="218" rx="12" ry="10" fill="#1A0A00"/>
  <circle cx="180" cy="215" r="3" fill="white" opacity="0.9"/>
  <circle cx="228" cy="215" r="3" fill="white" opacity="0.9"/>

  <!-- Eyebrows -->
  <path d="M162 205 Q176 199 190 204" fill="none" stroke="#1A0A00" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M210 204 Q224 199 238 205" fill="none" stroke="#1A0A00" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Nose -->
  <path d="M196 228 Q192 242 196 248 Q200 252 204 248 Q208 242 204 228" fill="none" stroke="#5C3520" stroke-width="2" stroke-linecap="round"/>

  <!-- Smile -->
  <path d="M180 262 Q200 275 220 262" fill="none" stroke="#5C3520" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Musical note — top left, small accent -->
  <g transform="translate(52, 58)" opacity="0.7">
    <text font-size="28" fill="#00C896">♪</text>
  </g>

  <!-- Trumpet icon suggestion — top right -->
  <g transform="translate(298, 52)" opacity="0.6">
    <path d="M0 20 Q8 14 18 16 L38 16 L42 10 L42 22 L38 16" fill="none" stroke="#00C896" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="6" cy="26" r="8" fill="none" stroke="#00C896" stroke-width="2"/>
  </g>

  <!-- Game controller — bottom right accent -->
  <g transform="translate(295, 295)" opacity="0.5">
    <rect x="0" y="8" width="48" height="28" rx="10" fill="none" stroke="#00C896" stroke-width="2"/>
    <circle cx="34" cy="18" r="3" fill="#00C896" opacity="0.6"/>
    <circle cx="40" cy="24" r="3" fill="#00C896" opacity="0.6"/>
    <line x1="10" y1="22" x2="18" y2="22" stroke="#00C896" stroke-width="2" stroke-linecap="round"/>
    <line x1="14" y1="18" x2="14" y2="26" stroke="#00C896" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Shield badge bottom left — cybersecurity -->
  <g transform="translate(44, 298)" opacity="0.5">
    <path d="M20 0 L40 8 L40 24 Q40 36 20 44 Q0 36 0 24 L0 8 Z" fill="none" stroke="#00C896" stroke-width="2"/>
    <text x="20" y="28" font-family="monospace" font-size="14" fill="#00C896" text-anchor="middle">CEH</text>
  </g>

  <!-- Accent ring -->
  <circle cx="200" cy="200" r="196" fill="none" stroke="#00C896" stroke-width="1.5" opacity="0.3"/>
</svg>